<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>$GODOT_PROJECT_NAME</title>
	<style>
html, body, #canvas { margin: 0; padding: 0; border: 0; }
body { color: #f3e9d2; background-color: #160f08; overflow: hidden; touch-action: none;
	font-family: 'Segoe UI', 'Noto Sans', Arial, sans-serif; }
#canvas { display: block; }
#canvas:focus { outline: none; }

/* Overlay VISIBLE desde el primer render: el logo y "Cargando" aparecen apenas se
   pinta index.html, sin esperar a index.js. */
#status { position: absolute; inset: 0; background-color: #160f08;
	display: flex; flex-direction: column; justify-content: center; align-items: center;
	visibility: visible; gap: 26px; }

#status-splash { max-width: 60%; max-height: 45%; width: auto; height: auto;
	object-fit: contain; filter: drop-shadow(0 6px 18px rgba(0,0,0,.6)); }

#status-progress { display: block; width: min(420px, 62%); height: 14px;
	background: #2a1d10; border: 1px solid rgba(225,175,46,.4); border-radius: 8px; overflow: hidden; }
#status-progress-fill { height: 100%; width: 0%;
	background: linear-gradient(90deg, #e1af2e, #f2cd5a); border-radius: 8px; transition: width .2s ease; }
#status-progress.indeterminate #status-progress-fill { width: 35%; animation: slide 1.1s infinite ease-in-out; }
@keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }

#status-cargando { display: block; font-size: 20px; letter-spacing: .5px;
	color: #e1af2e; text-shadow: 0 2px 4px rgba(0,0,0,.6); }
#status-cargando .dot { animation: blink 1.4s infinite both; }
#status-cargando .dot:nth-child(2) { animation-delay: .2s; }
#status-cargando .dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%, 80%, 100% { opacity: .15; } 40% { opacity: 1; } }

#status-notice { display: none; background-color: #5b3943; border-radius: .5rem;
	border: 1px solid #9b3943; color: #e0e0e0; line-height: 1.3; margin: 0 2rem;
	overflow: hidden; padding: 1rem; text-align: center; z-index: 1; }
	</style>

	<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const progressFill = document.getElementById('status-progress-fill');
	const statusCargando = document.getElementById('status-cargando');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) { return; }
		if (mode === 'hidden') { statusOverlay.remove(); initializing = false; return; }
		statusOverlay.style.visibility = 'visible';
		const showProgress = mode === 'progress';
		statusProgress.style.display = showProgress ? 'block' : 'none';
		statusCargando.style.display = showProgress ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) { statusNotice.removeChild(statusNotice.lastChild); }
		text.split('\n').forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) { setStatusNotice(err.message); }
		else if (typeof err === 'string') { setStatusNotice(err); }
		else { setStatusNotice('Ocurrio un error desconocido.'); }
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let swPromise;
			try { swPromise = navigator.serviceWorker.getRegistration(); }
			catch (err) { swPromise = Promise.reject(new Error('Service worker registration failed.')); }
			Promise.race([
				swPromise.then((r) => { if (r != null) { return Promise.reject(new Error('Service worker already exists.')); } return r; }).then(() => engine.installServiceWorker()),
				new Promise((resolve) => { setTimeout(() => resolve(), 2000); }),
			]).then(() => { window.location.reload(); }).catch((err) => { console.error('Error while registering service worker:', err); });
		} else {
			displayFailureNotice('Error\nFaltan funciones del navegador para ejecutar el juego:\n' + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.classList.remove('indeterminate');
					progressFill.style.width = Math.round((current / total) * 100) + '%';
				} else {
					progressFill.style.width = '';
					statusProgress.classList.add('indeterminate');
				}
			},
		}).then(() => { setStatusMode('hidden'); }, displayFailureNotice);
	}
}());
	</script>
